<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script>
        const qrGeneratedAt = parseInt("{{ last_qr_time }}");  //UNIX timestamp
        const refreshInterval = 30;  //seconds
        let remaining = refreshInterval - (Math.floor(Date.now() / 1000) - qrGeneratedAt);

        if (remaining < 0) remaining = 30; //QR already expired

        function startCountdown() {
            const countdownElement = document.getElementById("countdown");

            // Set initial text based on computed remaining
            countdownElement.innerText = "QR refreshes in " + remaining + " seconds";

            setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    fetchNewQR();
                    remaining = refreshInterval;
                }
                countdownElement.innerText = "QR refreshes in " + remaining + " seconds";
            }, 1000);
        }

        function fetchNewQR() {
            fetch('/refresh_qr')
                .then(response => response.json())
                .then(data => {
                    if (data.qr_base64) {
                        document.getElementById("qr-img").setAttribute("src", "data:image/png;base64," + data.qr_base64);
                    }
                })
                .catch(error => {
                    console.error("Error refreshing QR:", error);
                });
        }

        window.onload = startCountdown;
    </script>

</head>
<body>
    <h2>Welcome {{ name }}!</h2>
    <p>Email: {{ email }}</p>
    <p>Role: {{ role }}</p>

    <h3>Your QR Code:</h3>
    <img id="qr-img" src="data:image/png;base64,{{ qr_base64 }}" alt="User QR Code" width="200" height="200">
    <p id="countdown"></p>

    <br><br>
    <a href="{{ url_for('logout') }}">Log out</a>
</body>
</html>
