<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">

    <script>
        const qrGeneratedAt = parseInt("{{ last_qr_time }}");  //UNIX timestamp
        const refreshInterval = 30;  //seconds
        let remaining = refreshInterval - (Math.floor(Date.now() / 1000) - qrGeneratedAt);

        if (remaining < 0) remaining = 30; //QR already expired

        function startCountdown() {
            const countdownElement = document.getElementById("countdown");
            countdownElement.innerText = "QR refreshes in " + remaining + " seconds";

            setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    fetchNewQR();
                    remaining = refreshInterval;
                }
                countdownElement.innerText = "QR refreshes in " + remaining + " seconds";
            }, 1000);
        }

        function fetchNewQR() {
            fetch('/refresh_qr')
                .then(response => response.json())
                .then(data => {
                    if (data.qr_base64) {
                        document.getElementById("qr-img").setAttribute("src", "data:image/png;base64," + data.qr_base64);
                    }
                })
                .catch(error => {
                    console.error("Error refreshing QR:", error);
                });
        }

        window.onload = startCountdown;

        function toggleHistory() {
            const list = document.getElementById("history-list");
            const isHidden = window.getComputedStyle(list).display === "none";
            list.style.display = isHidden ? "block" : "none";
        }
    </script>
</head>

<body class="dashboard-page">
    <h2 class="welcome">Welcome {{ name }}!</h2>

    <div class="user-info">
        <p><strong>Email:</strong> {{ email }}</p>
        <p><strong>Role:</strong> {{ role }}</p>
    </div>

    <h3 class="qr-title">Your QR Code:</h3>
    <img id="qr-img" src="data:image/png;base64,{{ qr_base64 }}" alt="User QR Code">
    <p id="countdown"></p>

    <div class="last-access">
        <h4 class="last-access-title">Last Access:</h4>
        {% if last_access %}
            <p class="last-access-value">{{ last_access }}</p>
        {% else %}
            <p class="last-access-value">No access yet.</p>
        {% endif %}
    </div>

    <h4 class="history-title">Access History</h4>
    <button onclick="toggleHistory()">Show / Hide Full History</button>
    <ul id="history-list">
        {% for entry in history %}
            <li>{{ entry }}</li>
        {% endfor %}
    </ul>

    <a href="{{ url_for('logout') }}">Log out</a>
</body>
</html>
