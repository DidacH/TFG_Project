<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="register-page">
    <h2>Register</h2>

    <form method="post">
        <label>Name:</label>
        <input type="text" name="name" value="{{ values.get('name', '') }}">
        {% if errors.get('name') %}
            <div class="error">{{ errors['name'] }}</div>
        {% endif %}

        <label>Email:</label>
        <input type="email" name="email" value="{{ values.get('email', '') }}">
        {% if errors.get('email') %}
            <div class="error">{{ errors['email'] }}</div>
        {% endif %}

        <label>Password:</label>
        <div class="password-container">
            <input type="password" name="password" id="password">
            <img src="{{ url_for('static', filename='images/eye.png') }}" id="togglePassword" class="toggle-password" alt="Toggle Password">
        </div>
        {% if errors.get('password') %}
            <div class="error">{{ errors['password'] }}</div>
        {% endif %}

        <label for="role">Role:</label>
        <select name="role" id="role" required>
            <option value="Student">Student</option>
            <option value="Professor">Professor</option>
            <option value="Staff">Staff</option>
            <option value="Admin">Admin</option>
        </select>
        {% if errors.get('role') %}
            <p class="error">{{ errors['role'] }}</p>
        {% endif %}

        <input type="submit" value="Register">
    </form>

    <div class="redirect-link">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = "{{ url_for('static', filename='images/eye.png') }}";
        const hiddenIcon = "{{ url_for('static', filename='images/hidden.png') }}";

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePassword.src = isPassword ? hiddenIcon : eyeIcon;
        });
    </script>
</body>
</html>
