<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-page">
    <div class="main-container">
        <h1 class="page-title">Edit User</h1>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-message">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" name="name" value="{{ user.name }}" required>
            </div>
            
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" value="{{ user.email }}" required>
            </div>
            
            <div class="form-group">
                <label>Role:</label>
                <select name="role" required>
                    <option value="Student" {% if user.role == "Student" %}selected{% endif %}>Student</option>
                    <option value="Staff" {% if user.role == "Staff" %}selected{% endif %}>Staff</option>
                    <option value="Professor" {% if user.role == "Professor" %}selected{% endif %}>Professor</option>
                    <option value="Admin" {% if user.role == "Admin" %}selected{% endif %}>Admin</option>
                </select>
            </div>
            
            <section class="log-actions">
                <button type="submit" name="action" value="apply" class="button">Apply Changes</button>
                <a href="{{ url_for('administrator') }}" class="button cancel">Back to Administrator Page</a>
            </section>

            {% if message %}
            <div class="form-group">
                <div class="message {{ 'success' if 'success' in message else 'error' }}">
                    {{ message }}
                </div>
            </div>
            {% endif %}
        </form>

        <style>
            .log-actions {
                display: flex;
                gap: 10px;
                margin-top: 20px;
            }
            
            .button {
                display: inline-block;
                padding: 8px 16px;
                background-color: #4CAF50;
                color: white;
                text-decoration: none;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 14px;
                text-align: center;
            }
            
            .button.cancel {
                background-color: #C8102E;
            }
            
            .button:hover {
                opacity: 0.9;
            }
            
            .message {
                margin-top: 15px;
                padding: 10px;
                border-radius: 4px;
            }
            
            .message.success {
                background-color: #dff0d8;
                color: #3c763d;
            }
            
            .message.error {
                background-color: #f2dede;
                color: #a94442;
            }
        </style>
    </div>
</body>
</html>
