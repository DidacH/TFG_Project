<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="main-container">
        <h2>Login</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-message">
              {% for message in messages %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post">
            <label for="email">Email:</label>
            <input type="text" name="email" id="email">

            <label for="password">Password:</label>
            <div class="password-container">
                <input type="password" name="password" id="password">
                <img src="{{ url_for('static', filename='images/eye.png') }}" id="togglePassword" class="toggle-password" alt="Toggle Password">
            </div>

            <input type="submit" value="Login">
        </form>

        <p class="redirect-link">No account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const eyeIcon = "{{ url_for('static', filename='images/eye.png') }}";
        const hiddenIcon = "{{ url_for('static', filename='images/hidden.png') }}";

        togglePassword.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePassword.src = isPassword ? hiddenIcon : eyeIcon;
        });
    </script>
</body>
</html>
